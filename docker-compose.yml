services:
  backend:
    build:
      context: ./backend
    # IMPORTANT: The backend container MUST run with these privileges
    # This is required for eBPF programs to load into the host kernel.
    privileged: true 
    pid: host 
    cap_add:
      - SYS_ADMIN # General admin capability, often needed for eBPF/kprobes
      - BPF # Capability for loading BPF programs (Linux 5.8+)
      - PERFMON # Capability for performance monitoring (CPU sampling)
      - NET_ADMIN # Networking related kprobes
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug
      - /proc:/proc
      - /lib/modules:/lib/modules:ro
      - /usr/src:/usr/src:ro
      - ./backend:/app # Mount code for easy development
    environment:
      - EBPFSCOPE_API_KEY=${EBPFSCOPE_API_KEY}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app 
      - /app/node_modules
    ports:
      - "5173:5173"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
